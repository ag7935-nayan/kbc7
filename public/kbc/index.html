<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KBC — Kaun Banega Crorepati</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;user-select:none;-webkit-user-select:none;
  font-family:'Rajdhani',sans-serif;
  background:radial-gradient(ellipse at 50% 35%,#0a1845 0%,#060d2a 55%,#020710 100%)}

/* ── SCREENS ── */
.scr{display:none;position:fixed;inset:0;z-index:1;flex-direction:column;align-items:center;justify-content:center}
.scr.on{display:flex}

/* ══════════════════════════
   INTRO
══════════════════════════ */
#s-intro{
  background:radial-gradient(ellipse at 50% 35%,#0c1e5a 0%,#060e2e 50%,#020810 100%);
  gap:0;
}
.intro-inner{display:flex;flex-direction:column;align-items:center;gap:24px;padding:40px 32px}

.logo-wrap{position:relative;width:180px;height:180px;display:flex;align-items:center;justify-content:center}
.logo-rings{position:absolute;inset:0}
.logo-rings circle{fill:none;stroke-width:1.5}
.logo-rings .lr1{stroke:rgba(0,180,255,.55);animation:lp 3s ease-in-out infinite}
.logo-rings .lr2{stroke:rgba(0,180,255,.22);animation:lp 3s ease-in-out .5s infinite reverse}
.logo-rings .lr3{stroke:rgba(0,180,255,.09);animation:lp 4s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:.6}50%{opacity:1}}
.logo-disc{
  width:130px;height:130px;border-radius:50%;
  background:radial-gradient(circle at 38% 30%,#0d2e7a,#040e35);
  border:1.5px solid rgba(0,160,255,.55);
  box-shadow:0 0 60px rgba(0,140,255,.32),inset 0 0 30px rgba(0,100,200,.22);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2px;
}
.logo-kbc{
  font-family:'Cinzel',serif;font-weight:900;font-size:2.4rem;letter-spacing:.22em;
  background:linear-gradient(160deg,#fff8cc 0%,#ffd700 45%,#b07800 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{font-size:.48rem;letter-spacing:.28em;color:rgba(0,200,255,.5);font-weight:700}

.intro-title{
  font-family:'Cinzel',serif;font-weight:700;letter-spacing:.08em;text-align:center;
  font-size:clamp(1rem,2.5vw,1.6rem);
  background:linear-gradient(160deg,#fff8cc 0%,#ffd700 55%,#9a6200 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.intro-rule{
  width:260px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,180,255,.5),transparent);
}
.intro-tag{font-size:.78rem;font-weight:600;letter-spacing:.18em;color:rgba(0,170,220,.7)}
.intro-stats{display:flex;gap:32px}
.intro-stat{display:flex;flex-direction:column;align-items:center;gap:3px}
.stat-n{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;color:#ffd700}
.stat-l{font-size:.6rem;letter-spacing:.14em;color:rgba(0,200,255,.5);font-weight:700}

.btn-play{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:.22em;
  color:#040e22;
  background:linear-gradient(135deg,#ffe84d 0%,#ffd700 50%,#c08000 100%);
  border:none;border-radius:60px;padding:15px 70px;cursor:pointer;
  box-shadow:0 0 50px rgba(255,215,0,.5),0 6px 24px rgba(0,0,0,.5);
  transition:transform .15s,box-shadow .15s;
}
.btn-play:hover{transform:scale(1.07);box-shadow:0 0 80px rgba(255,215,0,.75),0 8px 28px rgba(0,0,0,.55)}
.btn-play:active{transform:scale(.96)}

/* ══════════════════════════
   GAME SCREEN
══════════════════════════ */
#s-game{
  flex-direction:row;align-items:stretch;padding:0;overflow:hidden;
  background:radial-gradient(ellipse at 50% 28%,#0a1845 0%,#060d2a 55%,#020710 100%);
}

/* ── LEFT PANEL ── */
.g-left{
  flex:1;min-width:0;
  display:flex;flex-direction:column;
  padding:16px 20px 20px 20px;gap:14px;
  position:relative;
}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;flex-shrink:0;
}
.lifelines{display:flex;gap:10px;align-items:center}
.ll{
  background:none;border:none;cursor:pointer;padding:0;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:transform .15s;
}
.ll:not(.used):hover{transform:scale(1.1)}
.ll-coin{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(145deg,#102260,#060f36);
  border:1.5px solid rgba(0,160,255,.48);
  box-shadow:0 0 16px rgba(0,140,255,.22),inset 0 1px 0 rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:800;color:#00c8ff;position:relative;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.ll-coin-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.ll-coin-icon{font-size:1.2rem;line-height:1}
.ll-coin-txt{font-size:.65rem;font-weight:900;letter-spacing:-.03em}
.ll-x{
  display:none;position:absolute;inset:0;border-radius:50%;
  background:rgba(0,0,0,.72);align-items:center;justify-content:center;
  font-size:1.2rem;color:#550022;font-weight:900;
}
.ll:not(.used):hover .ll-coin{border-color:rgba(0,200,255,.9);box-shadow:0 0 30px rgba(0,200,255,.45)}
.ll.used .ll-coin{border-color:rgba(0,40,70,.4);box-shadow:none;background:#050e28}
.ll.used .ll-coin-inner{opacity:0}
.ll.used .ll-x{display:flex}
.ll-lbl{font-size:.52rem;letter-spacing:.1em;color:rgba(0,160,200,.6);font-weight:700}

/* TIMER */
.timer-wrap{position:relative;width:68px;height:68px;flex-shrink:0}
.t-svg{width:100%;height:100%;transform:rotate(-90deg)}
.t-bg{fill:rgba(8,20,70,.8);stroke:rgba(0,60,100,.5);stroke-width:3}
.t-track{fill:none;stroke:rgba(0,50,90,.5);stroke-width:5}
.t-ring{
  fill:none;stroke:#00b8ff;stroke-width:5;stroke-linecap:round;
  stroke-dasharray:183;stroke-dashoffset:0;
  transition:stroke-dashoffset 1s linear,stroke .4s;
}
.t-ring.warn{stroke:#ff8c00}
.t-ring.danger{stroke:#ff1a44;animation:td .55s ease-in-out infinite alternate}
@keyframes td{from{filter:drop-shadow(0 0 3px #ff1a44)}to{filter:drop-shadow(0 0 14px #ff1a44)}}
.t-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:1.15rem;font-weight:900;color:#00c8ff;
  transition:color .4s;
}
.t-num.warn{color:#ff8c00}
.t-num.danger{color:#ff1a44}

/* ── OVERLAY PANEL ── */
.ov-zone{
  flex-shrink:0;min-height:100px;max-height:120px;
  display:flex;align-items:flex-end;
}
.ov-card{
  width:100%;padding:14px 20px;
  background:rgba(4,12,50,.95);
  border:1.5px solid rgba(0,170,255,.4);border-radius:14px;
  box-shadow:0 0 30px rgba(0,170,255,.1);
  animation:ovin .2s ease;
}
@keyframes ovin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ph-line{font-family:'Cinzel',serif;font-size:.92rem;color:#ffd700;text-align:center;line-height:1.6}
.ph-cd{text-align:center;margin-top:5px;color:rgba(0,180,255,.65);font-size:.7rem;letter-spacing:.06em}
.aud-title{font-size:.58rem;color:rgba(0,180,255,.6);letter-spacing:.18em;text-align:center;margin-bottom:8px}
.aud-row{display:flex;gap:16px;justify-content:center;align-items:flex-end;height:68px}
.aud-col{display:flex;flex-direction:column;align-items:center;gap:2px;width:44px}
.aud-pct{font-size:.65rem;color:#00c8ff;font-weight:700}
.aud-well{width:100%;height:50px;background:rgba(0,25,55,.55);border-radius:2px 2px 0 0;overflow:hidden;display:flex;align-items:flex-end}
.aud-fill{width:100%;height:0;background:linear-gradient(to top,#003860,#00c8ff);transition:height 1.1s ease-out}
.aud-ltr{font-weight:700;color:#ffd700;font-size:.85rem}

/* ── QUESTION ── */
.q-outer{
  flex-shrink:0;position:relative;
}
.q-box{
  width:100%;
  background:linear-gradient(180deg,rgba(12,26,90,.96),rgba(6,14,54,.98));
  border:1.5px solid rgba(0,160,255,.5);
  border-radius:50px;
  padding:18px 72px;
  min-height:88px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  box-shadow:0 0 60px rgba(0,130,255,.1),inset 0 0 40px rgba(0,60,160,.12);
  position:relative;overflow:hidden;
}
.q-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
}
.q-no{font-size:.58rem;font-weight:700;letter-spacing:.22em;color:rgba(0,170,220,.55)}
.q-text{
  font-family:'Cinzel',serif;font-weight:600;text-align:center;
  font-size:clamp(.78rem,1.5vw,1.05rem);line-height:1.65;color:#dde8ff;
}

/* ── ANSWERS ── */
.ans-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  flex-shrink:0;
}
.ans{
  position:relative;overflow:hidden;
  display:flex;align-items:stretch;
  border-radius:50px;
  cursor:pointer;
  border:1.5px solid rgba(0,110,180,.38);
  background:linear-gradient(135deg,rgba(10,28,90,.94),rgba(6,16,60,.96));
  padding:0;
  transition:border-color .22s,box-shadow .22s,background .25s,transform .1s;
}
.ans::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.ans:hover:not(:disabled)::after{opacity:1}
.ans:hover:not(:disabled){
  border-color:rgba(0,200,255,.65);
  box-shadow:0 0 24px rgba(0,200,255,.24);
}
.ans:active:not(:disabled){transform:scale(.985)}
.ans:disabled{cursor:default}

/* Letter badge */
.ans-ltr-wrap{
  display:flex;align-items:center;justify-content:center;
  padding:0 0 0 22px;flex-shrink:0;width:62px;
  position:relative;
}
.ans-ltr-wrap::after{
  content:'';position:absolute;right:0;top:20%;bottom:20%;
  width:1px;background:rgba(0,160,255,.3);
}
.ans-ltr{
  font-family:'Cinzel',serif;font-size:.9rem;font-weight:900;
  color:#ffd700;
}
.ans-colon{color:rgba(0,180,255,.5);font-weight:400;font-size:.9rem}

/* Answer text */
.ans-text{
  flex:1;display:flex;align-items:center;
  padding:14px 20px 14px 18px;
  font-size:clamp(.76rem,1.3vw,.95rem);font-weight:600;
  color:#ccdaff;line-height:1.3;
}

/* States */
.ans.sel{
  background:linear-gradient(135deg,rgba(120,55,0,.95),rgba(75,32,0,.95));
  border-color:#ff9900;box-shadow:0 0 30px rgba(255,153,0,.35);
}
.ans.sel .ans-text{color:#ffe0aa}
.ans.sel .ans-ltr{color:#ffb300}
.ans.correct{
  background:linear-gradient(135deg,rgba(0,90,30,.95),rgba(0,55,18,.95));
  border-color:#00e87a;box-shadow:0 0 35px rgba(0,232,122,.4);
}
.ans.correct .ans-text{color:#a0ffcc}
.ans.correct .ans-ltr{color:#00e87a}
.ans.wrong{
  background:linear-gradient(135deg,rgba(95,0,20,.95),rgba(60,0,14,.95));
  border-color:#ff1a44;box-shadow:0 0 35px rgba(255,26,68,.4);
}
.ans.wrong .ans-text{color:#ffa0b0}
.ans.wrong .ans-ltr{color:#ff1a44}
.ans.elim{opacity:0;pointer-events:none;transition:opacity .3s}

/* ── RIGHT PANEL: PRIZE LADDER ── */
.g-right{
  width:145px;flex-shrink:0;
  display:flex;flex-direction:column;justify-content:center;
  padding:14px 10px;gap:0;
  border-left:1px solid rgba(0,100,160,.18);
  background:rgba(2,6,30,.7);
  overflow:hidden;
}
.prize-row{
  display:flex;align-items:center;justify-content:flex-start;gap:7px;
  padding:4px 8px;border-radius:4px;
  transition:background .3s;position:relative;flex-shrink:0;
}
.prize-row.safe{background:rgba(255,153,0,.08)}
.prize-row.cur{background:linear-gradient(90deg,rgba(255,215,0,.15),rgba(255,215,0,.06));border:none}
.prize-row.won{background:rgba(0,180,100,.07)}
.pz-q{
  font-size:.6rem;font-weight:700;color:rgba(0,200,255,.38);
  width:18px;text-align:right;flex-shrink:0;
}
.prize-row.cur .pz-q{color:rgba(255,215,0,.6)}
.pz-amt{
  font-family:'Rajdhani',sans-serif;font-size:.68rem;font-weight:600;
  color:rgba(160,190,240,.55);
  white-space:nowrap;
}
.prize-row.safe .pz-amt{color:rgba(255,153,0,.65)}
.prize-row.cur .pz-amt{
  font-size:.8rem;font-weight:700;
  color:#ffd700;
}
.prize-row.won .pz-amt{color:rgba(0,230,120,.55)}
.pz-dot{
  width:5px;height:5px;border-radius:50%;flex-shrink:0;
  background:rgba(0,100,160,.3);
}
.prize-row.safe .pz-dot{background:rgba(255,153,0,.4)}
.prize-row.cur .pz-dot{background:#ffd700;box-shadow:0 0 8px #ffd700}
.prize-row.won .pz-dot{background:rgba(0,230,120,.45)}

/* ══════════════════════════
   END SCREENS
══════════════════════════ */
#s-over,#s-win{
  background:radial-gradient(ellipse at 50% 35%,#0c1e5a 0%,#060e2e 50%,#020810 100%);
}
.end-card{
  background:linear-gradient(180deg,rgba(8,18,72,.98),rgba(4,10,44,.98));
  border:1.5px solid rgba(0,180,255,.4);border-radius:22px;
  padding:48px 56px;max-width:480px;width:calc(100% - 48px);
  box-shadow:0 0 80px rgba(0,180,255,.1);
  display:flex;flex-direction:column;align-items:center;gap:16px;
}
.end-icon{font-size:3.2rem;line-height:1}
.end-title{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:900;color:#dde8ff}
.end-sub{color:rgba(100,140,230,.5);font-size:.98rem;font-weight:500;text-align:center}
.end-score{
  font-family:'Cinzel',serif;font-size:2.5rem;font-weight:900;
  background:linear-gradient(160deg,#fff8cc,#ffd700 55%,#7a5200);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  padding:12px 0;width:100%;text-align:center;
  border-top:1px solid rgba(0,180,255,.14);border-bottom:1px solid rgba(0,180,255,.14);
}
.end-lbl{color:rgba(100,140,230,.45);font-size:.72rem;letter-spacing:.1em}
.btn-again{
  margin-top:4px;padding:13px 50px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.14em;
  color:#dde8ff;background:rgba(0,120,200,.5);border:1.5px solid rgba(0,170,255,.4);
  border-radius:50px;cursor:pointer;transition:background .2s,transform .15s;
}
.btn-again:hover{background:rgba(0,160,255,.7);transform:scale(1.06)}

/* WIN */
#s-win .end-card{border-color:rgba(255,215,0,.5);box-shadow:0 0 120px rgba(255,215,0,.22)}
.win-text{
  font-family:'Cinzel',serif;font-size:clamp(2.2rem,6vw,3.8rem);font-weight:900;
  background:linear-gradient(160deg,#fff8cc,#ffd700 55%,#7a5200);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gp 1.8s ease-in-out infinite;
}
@keyframes gp{0%,100%{filter:drop-shadow(0 0 4px rgba(255,215,0,.3))}50%{filter:drop-shadow(0 0 24px rgba(255,215,0,1))}}
.btn-win{
  margin-top:4px;padding:13px 50px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.14em;
  color:#040e22;background:linear-gradient(135deg,#ffd700,#c08000);
  border:none;border-radius:50px;cursor:pointer;
  box-shadow:0 0 36px rgba(255,215,0,.4);
  transition:transform .15s,box-shadow .15s;
}
.btn-win:hover{transform:scale(1.07);box-shadow:0 0 60px rgba(255,215,0,.7)}

/* WALK BTN */
.btn-walk{
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.72rem;letter-spacing:.1em;
  color:rgba(0,180,255,.6);background:rgba(0,4,22,.6);
  border:1px solid rgba(0,140,200,.22);border-radius:8px;padding:8px 14px;cursor:pointer;
  transition:all .2s;
}
.btn-walk:hover{border-color:rgba(0,200,255,.55);color:#00c8ff}

/* CONFETTI */
.cf{position:fixed;top:-20px;pointer-events:none;z-index:999;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(110vh) rotate(960deg);opacity:0}}

/* MUTE */
#snd{
  position:fixed;bottom:14px;right:16px;z-index:900;
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,4,22,.85);border:1px solid rgba(0,160,255,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.9rem;color:#fff;transition:background .2s;
}
#snd:hover{background:rgba(0,12,50,.9);border-color:rgba(0,200,255,.5)}

/* ══════════════════════════
   CLASS ENTRY POPUP
══════════════════════════ */
#popup-overlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(1,3,22,.88);
  backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
}
#popup-overlay.hide{display:none}
.popup-card{
  background:linear-gradient(170deg,rgba(10,22,82,.98),rgba(4,10,46,.99));
  border:1.5px solid rgba(0,180,255,.45);border-radius:22px;
  padding:40px 44px;width:min(440px,calc(100vw - 40px));
  box-shadow:0 0 100px rgba(0,160,255,.15),0 24px 60px rgba(0,0,0,.65);
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
.popup-logo{width:110px;height:110px;object-fit:contain;
  filter:drop-shadow(0 0 18px rgba(100,80,255,.5));
  animation:lp 3s ease-in-out infinite}
.popup-title{
  font-family:'Cinzel',serif;font-weight:900;font-size:1.35rem;letter-spacing:.06em;
  background:linear-gradient(160deg,#fff8cc,#ffd700 55%,#9a6200);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;line-height:1.4;
}
.popup-sub{font-size:.75rem;letter-spacing:.14em;color:rgba(0,170,220,.55);font-weight:600}
.popup-form{width:100%;display:flex;flex-direction:column;gap:12px}
.popup-field{display:flex;flex-direction:column;gap:5px}
.popup-label{font-size:.62rem;font-weight:700;letter-spacing:.16em;color:rgba(0,180,255,.5)}
.popup-input{
  width:100%;
  background:rgba(3,8,40,.9);
  border:1.5px solid rgba(0,140,200,.3);border-radius:10px;
  padding:12px 16px;
  font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;
  color:#dde8ff;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.popup-input::placeholder{color:rgba(80,120,180,.35)}
.popup-input:focus{border-color:rgba(0,200,255,.6);box-shadow:0 0 18px rgba(0,200,255,.12)}
.popup-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,180,255,.3),transparent);width:100%}
.popup-start{
  width:100%;padding:14px;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:.2em;
  color:#040e22;
  background:linear-gradient(135deg,#ffe84d,#ffd700 50%,#c08000);
  border:none;border-radius:50px;cursor:pointer;
  box-shadow:0 0 40px rgba(255,215,0,.4);
  transition:transform .15s,box-shadow .15s;
}
.popup-start:hover{transform:scale(1.04);box-shadow:0 0 65px rgba(255,215,0,.65)}
.popup-start:active{transform:scale(.97)}

/* Player badge in game */
.player-badge{
  font-size:.62rem;font-weight:700;letter-spacing:.08em;
  color:rgba(0,200,255,.5);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:120px;
}
.player-badge span{color:rgba(255,215,0,.6)}

/* LEADERBOARD */
.lb-wrap{width:100%;margin-top:6px}
.lb-title{font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.18em;color:#ffd700;text-align:center;margin-bottom:8px;font-weight:700}
.lb-empty{font-size:.7rem;color:rgba(0,170,220,.5);text-align:center;letter-spacing:.08em;padding:6px 0}
.lb-list{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;padding-right:4px}
.lb-row{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:8px;padding:6px 10px;background:rgba(3,8,40,.7);border:1px solid rgba(0,140,200,.18);border-radius:8px}
.lb-row.me{border-color:rgba(255,215,0,.55);background:rgba(60,40,0,.55)}
.lb-rank{font-family:'Cinzel',serif;font-weight:900;color:#00c8ff;font-size:.8rem;text-align:center}
.lb-row:nth-child(1) .lb-rank{color:#ffd700}
.lb-row:nth-child(2) .lb-rank{color:#c0c8d8}
.lb-row:nth-child(3) .lb-rank{color:#cd7f32}
.lb-name{font-size:.78rem;font-weight:700;color:#dde8ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-cls{font-size:.6rem;color:rgba(0,180,255,.55);font-weight:600;letter-spacing:.06em}
.lb-pts{font-family:'Cinzel',serif;font-size:.8rem;font-weight:900;color:#ffd700;white-space:nowrap}
</style>
</head>
<body>
<button id="snd" title="Toggle sound">🔊</button>

<!-- CLASS ENTRY POPUP -->
<div id="popup-overlay">
  <div class="popup-card">
    <img src="/kbc/kbc-logo.png" class="popup-logo" alt="KBC"/>
    <div class="popup-title">Kaun Banega Crorepati<br/>Quiz Challenge</div>
    <div class="popup-sub">SHREE SWAMINARAYAN GURUKUL</div>
    <div class="popup-divider"></div>
    <div class="popup-form">
      <div class="popup-field">
        <label class="popup-label" for="inp-name">YOUR NAME</label>
        <input class="popup-input" id="inp-name" type="text" placeholder="Enter your full name" maxlength="40" autocomplete="off"/>

      <div class="popup-field">
        <label class="popup-label" for="inp-class">YOUR CLASS</label>
        <input class="popup-input" id="inp-class" type="text" placeholder="e.g. Class 8 — A" maxlength="20" autocomplete="off"/>
      </div>
      <button class="popup-start" id="btnStart">LET'S PLAY!</button>
    </div>
    <div class="popup-divider"></div>
    <div class="lb-wrap">
      <div class="lb-title">🏆 LEADERBOARD</div>
      <div id="lbList"></div>
    </div>
  </div>
</div>

<!-- Corner logos -->
<img id="logo-gurukul" src="/kbc/gurukul.jpg" alt="Gurukul International School"
  style="position:fixed;top:10px;left:12px;z-index:950;height:64px;width:auto;border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,.55);object-fit:contain;background:#fff;padding:4px"/>
<img id="logo-kbc" src="/kbc/kbc-logo.png" alt="KBC Logo"
  style="position:fixed;top:6px;right:52px;z-index:950;height:76px;width:auto;filter:drop-shadow(0 2px 10px rgba(0,0,0,.7))"/>

<!-- INTRO -->
<div id="s-intro" class="scr on">
  <div class="intro-inner">
    <div class="logo-wrap">
      <img src="/kbc/kbc-logo.png" alt="Kaun Banega Crorepati" style="width:200px;height:200px;object-fit:contain;filter:drop-shadow(0 0 28px rgba(100,80,255,.55)) drop-shadow(0 0 60px rgba(80,60,200,.35));animation:lp 3s ease-in-out infinite"/>
    </div>

    <div class="intro-title">Kaun Banega Crorepati</div>
    <div class="intro-rule"></div>
    <div class="intro-tag">TEST YOUR KNOWLEDGE</div>

    <div class="intro-stats">
      <div class="intro-stat"><span class="stat-n">15</span><span class="stat-l">QUESTIONS</span></div>
      <div class="intro-stat"><span class="stat-n">3</span><span class="stat-l">LIFELINES</span></div>
      <div class="intro-stat"><span class="stat-n">60</span><span class="stat-l">SECONDS</span></div>
    </div>

    <button class="btn-play" id="btnPlay">PLAY NOW</button>

</div>

<!-- GAME -->
<div id="s-game" class="scr">
  <!-- LEFT -->
  <div class="g-left">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="lifelines">
        <button class="ll" id="ll50" title="50:50">
          <div class="ll-coin"><div class="ll-coin-inner"><span class="ll-coin-txt">50:50</span></div><span class="ll-x">✕</span></div>
          <span class="ll-lbl">FIFTY-FIFTY</span>
        </button>
        <button class="ll" id="llAu" title="Ask the Audience">
          <div class="ll-coin"><div class="ll-coin-inner"><span class="ll-coin-icon">👥</span></div><span class="ll-x">✕</span></div>
          <span class="ll-lbl">AUDIENCE</span>
        </button>
        <button class="ll" id="llPh" title="Phone a Friend">
          <div class="ll-coin"><div class="ll-coin-inner"><span class="ll-coin-icon">📞</span></div><span class="ll-x">✕</span></div>
          <span class="ll-lbl">PHONE</span>
        </button>
      </div>

      <div class="timer-wrap">
        <svg class="t-svg" viewBox="0 0 68 68">
          <circle class="t-bg" cx="34" cy="34" r="32"/>
          <circle class="t-track" cx="34" cy="34" r="29"/>
          <circle class="t-ring" cx="34" cy="34" r="29" id="tRing"/>
        </svg>
        <div class="t-num" id="tNum">60</div>
      </div>

      <div class="player-badge" id="playerBadge"></div>
      <button class="btn-walk" id="btnWalk">🚶 WALK AWAY</button>
    </div>

    <!-- OVERLAY -->
    <div class="ov-zone" id="ovZone"></div>

    <!-- QUESTION -->
    <div class="q-outer">
      <div class="q-box">
        <div class="q-no" id="qNo">QUESTION 1 OF 15</div>

    <!-- ANSWERS -->
    <div class="ans-grid" id="ansGrid">

        <span class="ans-text"></span>
      </button>
      <button class="ans" data-i="1">
        <div class="ans-ltr-wrap"><span class="ans-ltr">B</span><span class="ans-colon">:</span></div>
        <span class="ans-text"></span>
      </button>
      <button class="ans" data-i="2">
        <div class="ans-ltr-wrap"><span class="ans-ltr">C</span><span class="ans-colon">:</span></div>
        <span class="ans-text"></span>
      </button>
      <button class="ans" data-i="3">
        <div class="ans-ltr-wrap"><span class="ans-ltr">D</span><span class="ans-colon">:</span></div>
        <span class="ans-text"></span>
      </button>
    </div>
  </div>

  <!-- RIGHT: PRIZE LADDER -->
  <div class="g-right" id="ladder"></div>
</div>

<!-- GAME OVER -->
<div id="s-over" class="scr">
  <div class="end-card">
    <div class="end-icon" id="goIcon">😢</div>
    <div class="end-title" id="goTitle">Game Over</div>
    <div class="end-sub" id="goSub"></div>
    <div id="goPlayer" style="font-size:.78rem;color:rgba(0,200,255,.5);letter-spacing:.08em;font-weight:600"></div>
    <div class="end-score" id="goScore">0 pts</div>
    <div class="end-lbl" id="goLbl">Points scored</div>
    <button class="btn-again" id="btnAgain">PLAY AGAIN</button>
  </div>
</div>

<!-- WIN -->
<div id="s-win" class="scr">
  <div class="end-card">
    <div class="end-icon">🏆</div>
    <div class="win-text">CROREPATI!</div>
    <div id="winPlayer" style="font-size:.88rem;color:rgba(0,200,255,.55);letter-spacing:.08em;font-weight:600"></div>
    <div style="color:rgba(100,140,230,.5);font-size:.92rem;font-weight:500;text-align:center">All 15 questions answered correctly!</div>
    <div style="font-family:'Cinzel',serif;font-size:2rem;font-weight:900;color:#ffd700;padding:8px 0">10,00,000 pts</div>
    <button class="btn-win" id="btnWin">PLAY AGAIN</button>
  </div>
</div>

<script>
/* ══════════════════════════════════
   PRIZE LADDER DATA  (points)
══════════════════════════════════ */
const PRIZES=[
  {n:1,  pts:100,      amt:'100 pts',      safe:false},
  {n:2,  pts:200,      amt:'200 pts',      safe:false},
  {n:3,  pts:300,      amt:'300 pts',      safe:false},
  {n:4,  pts:500,      amt:'500 pts',      safe:false},
  {n:5,  pts:1000,     amt:'1,000 pts',    safe:true},
  {n:6,  pts:2000,     amt:'2,000 pts',    safe:false},
  {n:7,  pts:4000,     amt:'4,000 pts',    safe:false},
  {n:8,  pts:8000,     amt:'8,000 pts',    safe:false},
  {n:9,  pts:16000,    amt:'16,000 pts',   safe:false},
  {n:10, pts:32000,    amt:'32,000 pts',   safe:true},
  {n:11, pts:64000,    amt:'64,000 pts',   safe:false},
  {n:12, pts:125000,   amt:'1,25,000 pts', safe:false},
  {n:13, pts:250000,   amt:'2,50,000 pts', safe:false},
  {n:14, pts:500000,   amt:'5,00,000 pts', safe:false},
  {n:15, pts:1000000,  amt:'10,00,000 pts',safe:false},
];

/* ══════════════════════════════════
   QUESTIONS
══════════════════════════════════ */
let QS=[];

/* ══════════════════════════════════
   AUDIO ENGINE  (real MP3s)
══════════════════════════════════ */
const AUDIO=(()=>{
  let muted=false;
  const base='/kbc/';
  const pool={};
  const load=(k,src,loop=false,vol=1)=>{
    const a=new Audio(base+src);a.loop=loop;a.volume=vol;pool[k]=a;return a;
  };
  load('theme','theme.mp3',true,.55);
  load('clock','clock.mp3',true,.75);
  load('correct','correct.mp3',false,1);
  load('wrong','wrong.mp3',false,1);
  load('timeout','timeout.mp3',false,1);
  load('letsplay','lets_play.mp3',false,.85);

  const stop=k=>{if(!pool[k])return;pool[k].pause();pool[k].currentTime=0};
  const stopAll=()=>Object.keys(pool).forEach(stop);
  const play=(k)=>{if(muted||!pool[k])return;stop(k);pool[k].play().catch(()=>{})};
  const loop=(k)=>{
    if(muted||!pool[k])return;
    pool[k].loop=true;
    pool[k].play().catch(()=>{});
  };
  const toggle=()=>{
    muted=!muted;
    if(muted)stopAll();
    return muted;
  };
  return{play,loop,stop,stopAll,toggle,isMuted:()=>muted};
})();

/* ══════════════════════════════════
   STATE
══════════════════════════════════ */
const TMAX=60,CIRC=2*Math.PI*29;
let qi=0,score=0,locked=false,elim=[],tLeft=TMAX,ticker=null,phoneCd=null;
let playerName='',playerClass='';

// Points helper: safe-haven fallback + current level
const getPts=()=>{
  if(qi===0)return 0;
  // walk-away / wrong: return last safe haven below qi, else 0
  const safeIdx=[4,9]; // 0-based indices of safe questions (Q5, Q10)
  let safe=0;
  for(const s of safeIdx)if(s<qi)safe=PRIZES[s].pts;
  return safe;
};
const getCurrentPts=()=>qi>0?PRIZES[qi-1].pts:0;

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
const $=id=>document.getElementById(id);
const scrs={intro:$('s-intro'),game:$('s-game'),over:$('s-over'),win:$('s-win')};
const btns=[...$('ansGrid').querySelectorAll('.ans')];
const show=n=>{Object.values(scrs).forEach(s=>s.classList.remove('on'));scrs[n].classList.add('on')};

/* ── PRIZE LADDER RENDER ── */
const renderLadder=()=>{
  const el=$('ladder');el.innerHTML='';
  for(let i=PRIZES.length-1;i>=0;i--){
    const p=PRIZES[i];
    const row=document.createElement('div');
    row.className='prize-row'+(p.safe?' safe':'')+(i===qi?' cur':i<qi?' won':'');
    row.innerHTML=`<span class="pz-q">${p.n}</span><span class="pz-dot"></span><span class="pz-amt">${p.amt}</span>`;
    el.appendChild(row);
  }
};

/* ── TIMER ── */
const updateTimer=()=>{
  const pct=tLeft/TMAX;
  $('tRing').style.strokeDashoffset=CIRC*(1-pct);
  $('tNum').textContent=tLeft;
  const cls=tLeft<=8?'danger':tLeft<=20?'warn':'';
  $('tRing').setAttribute('class','t-ring'+(cls?' '+cls:''));
  $('tNum').className='t-num'+(cls?' '+cls:'');
};

const startTimer=()=>{
  stopTimer();tLeft=TMAX;updateTimer();
  AUDIO.stop('clock');AUDIO.loop('clock');
  ticker=setInterval(()=>{
    tLeft--;updateTimer();
    if(tLeft<=0){stopTimer();timeUp()}
  },1000);
};
const stopTimer=()=>{
  if(ticker){clearInterval(ticker);ticker=null}
  AUDIO.stop('clock');
};

const timeUp=()=>{
  AUDIO.play('timeout');locked=true;
  btns.forEach(b=>b.disabled=true);
  btns[QS[qi].c].classList.add('correct');
  setTimeout(()=>endGame('timeout'),2600);
};

/* ── RENDER Q ── */
const render=()=>{
  const q=QS[qi];
  $('qNo').textContent=`QUESTION ${qi+1} OF 15`;
  $('qText').textContent=q.q;
  ['A','B','C','D'].forEach((l,i)=>{
    btns[i].className='ans';btns[i].disabled=false;
    btns[i].querySelector('.ans-ltr').textContent=l;
    btns[i].querySelector('.ans-text').textContent=q.o[i];
    if(elim.includes(i))btns[i].classList.add('elim');
  });
  clearOv();renderLadder();locked=false;
  startTimer();
};

/* ── ANSWER ── */
const pick=i=>{
  if(locked||elim.includes(i))return;
  locked=true;stopTimer();
  btns.forEach(b=>b.disabled=true);
  btns[i].classList.add('sel');
  setTimeout(()=>{
    const c=QS[qi].c;
    if(i===c){
      btns[i].classList.replace('sel','correct');
      score++;AUDIO.play('correct');
      setTimeout(()=>{
        if(qi===14){
          // WIN
          const pl=playerName?`${playerName}${playerClass?' · '+playerClass:''}`:''
          $('winPlayer').textContent=pl;
          saveScore(1000000);
          show('win');AUDIO.stop('correct');confetti();
        }else{qi++;elim=[];render()}
      },2500);
    }else{
      btns[i].classList.replace('sel','wrong');
      btns[c].classList.add('correct');
      AUDIO.play('wrong');
      setTimeout(()=>endGame('wrong'),2600);
    }
  },1800);
};

/* ── POINTS FORMAT ── */
const fmtPts=n=>n.toLocaleString('en-IN')+' pts';

/* ── END ── */
const endGame=reason=>{
  stopTimer();AUDIO.stopAll();
  const map={
    wrong:['😢','Wrong Answer!','Better luck next time!'],
    timeout:['⏱️','Time\'s Up!','You ran out of time.'],
    walk:['🚶','You Walked Away!',`Safe points secured!`],
  };
  const[ic,ti,su]=map[reason];
  $('goIcon').textContent=ic;
  $('goTitle').textContent=ti;
  $('goSub').textContent=su;

  // Player info line
  const pl=playerName?`${playerName}${playerClass?' · '+playerClass:''}`:''
  $('goPlayer').textContent=pl;

  // Points: wrong/timeout → safe haven pts; walk → pts at current level
  let pts=0;
  if(reason==='walk'){
    pts=qi>0?PRIZES[qi-1].pts:0;
  }else{
    // safe haven fallback
    const safeIdx=[4,9];
    for(const s of safeIdx)if(s<qi)pts=PRIZES[s].pts;
  }
  $('goScore').textContent=fmtPts(pts);
  $('goLbl').textContent=`${score} question${score!==1?'s':''} answered correctly`;
  saveScore(pts);
  show('over');
};

/* ── LIFELINES ── */
const do5050=()=>{
  if($('ll50').classList.contains('used')||locked)return;
  $('ll50').classList.add('used');
  const pool=[0,1,2,3].filter(i=>i!==QS[qi].c&&!elim.includes(i)).sort(()=>Math.random()-.5).slice(0,2);
  pool.forEach(i=>{elim.push(i);btns[i].classList.add('elim')});
};

const doPhone=()=>{
  if($('llPh').classList.contains('used')||locked)return;
  $('llPh').classList.add('used');
  const right=Math.random()<.82;
  let guess=QS[qi].c;
  if(!right){const pool=[0,1,2,3].filter(i=>i!==QS[qi].c&&!elim.includes(i));if(pool.length)guess=pool[Math.floor(Math.random()*pool.length)]}
  const L=['A','B','C','D'];
  let s=10;
  const card=document.createElement('div');card.className='ov-card';
  card.innerHTML=`<div class="ph-line">"I'm fairly sure it's <strong style="color:#ffd700">${L[guess]}: ${QS[qi].o[guess]}</strong> — go for it!"</div><div class="ph-cd" id="pcd">📞 Call ends in ${s}s</div>`;
  $('ovZone').innerHTML='';$('ovZone').appendChild(card);
  if(phoneCd)clearInterval(phoneCd);
  phoneCd=setInterval(()=>{
    s--;const el=document.getElementById('pcd');
    if(el)el.textContent=s>0?`📞 Call ends in ${s}s`:'📞 Call ended';
    if(s<=0){clearInterval(phoneCd);phoneCd=null;setTimeout(clearOv,800)}
  },1000);
};

const doAudience=()=>{
  if($('llAu').classList.contains('used')||locked)return;
  $('llAu').classList.add('used');
  const c=QS[qi].c,pct=[0,0,0,0];
  const share=48+Math.floor(Math.random()*32);pct[c]=share;
  let rem=100-share;
  [0,1,2,3].filter(i=>i!==c&&!elim.includes(i)).forEach((i,idx,arr)=>{
    if(idx===arr.length-1){pct[i]=rem}
    else{const v=Math.floor(Math.random()*(rem/2));pct[i]=v;rem-=v}
  });
  const L=['A','B','C','D'];
  const card=document.createElement('div');card.className='ov-card';
  card.innerHTML=`<div class="aud-title">👥 AUDIENCE POLL RESULTS</div><div class="aud-row">${L.map((l,i)=>`<div class="aud-col"><div class="aud-pct">${pct[i]}%</div><div class="aud-well"><div class="aud-fill" id="af${i}"></div></div><div class="aud-ltr">${l}</div></div>`).join('')}</div>`;
  $('ovZone').innerHTML='';$('ovZone').appendChild(card);
  requestAnimationFrame(()=>[0,1,2,3].forEach(i=>{const el=document.getElementById('af'+i);if(el)el.style.height=pct[i]+'%'}));
  setTimeout(clearOv,9000);
};

const clearOv=()=>{if(phoneCd){clearInterval(phoneCd);phoneCd=null}$('ovZone').innerHTML=''};

/* ── START ── */
const startGame=()=>{
  qi=0;score=0;elim=[];locked=false;clearOv();stopTimer();AUDIO.stopAll();
  ['ll50','llPh','llAu'].forEach(id=>$(id).classList.remove('used'));
  // Update player badge in game header
  const badge=$('playerBadge');
  if(badge){
    badge.innerHTML=playerName
      ?`<span style="color:rgba(255,215,0,.55)">${playerName}</span>${playerClass?' &nbsp;·&nbsp; '+playerClass:''}`
      :'';
  }
  AUDIO.play('letsplay');
  setTimeout(()=>{render();show('game')},1200);
};

/* ── CONFETTI ── */
const confetti=()=>{
  const cols=['#ffd700','#ff6b35','#00c8ff','#ff1a44','#00e87a','#ff4081','#ffeb3b','#a855f7'];
  for(let i=0;i<180;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='cf';
      const sz=4+Math.random()*10,tall=Math.random()>.5;
      el.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${tall?sz*2.2:sz}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),6000);
    },i*18);
  }
};

/* ── LEADERBOARD ──
   Seed entries are loaded from /kbc/leaderboard.json (read-only).
   New player scores are appended in browser localStorage and merged
   with the seed list at render time. */
const LB_KEY='kbc_leaderboard_v1';
let lastEntryId=null;
let lbSeed=[];
const loadLocal=()=>{try{return JSON.parse(localStorage.getItem(LB_KEY))||[]}catch(e){return[]}};
const loadLB=()=>{
  const merged=[...lbSeed,...loadLocal()];
  merged.sort((a,b)=>b.pts-a.pts||(a.ts||0)-(b.ts||0));
  return merged;
};
const saveScore=(pts)=>{
  if(!playerName)return;
  const local=loadLocal();
  const id=Date.now()+'_'+Math.random().toString(36).slice(2,7);
  local.push({id,name:playerName,cls:playerClass,pts,ts:Date.now()});
  local.sort((a,b)=>b.pts-a.pts||a.ts-b.ts);
  try{localStorage.setItem(LB_KEY,JSON.stringify(local.slice(0,50)))}catch(e){}
  lastEntryId=id;
};
const renderLB=()=>{
  const el=$('lbList');if(!el)return;
  const list=loadLB().slice(0,10);
  if(!list.length){el.innerHTML='<div class="lb-empty">No scores yet — be the first!</div>';return}
  el.innerHTML='<div class="lb-list">'+list.map((e,i)=>{
    const me=e.id&&e.id===lastEntryId?' me':'';
    const cls=e.cls?`<div class="lb-cls">${escapeHtml(e.cls)}</div>`:'';
    return `<div class="lb-row${me}"><div class="lb-rank">${i+1}</div><div><div class="lb-name">${escapeHtml(e.name)}</div>${cls}</div><div class="lb-pts">${e.pts.toLocaleString('en-IN')}</div></div>`;
  }).join('')+'</div>';
};
const escapeHtml=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const showPopup=()=>{$('popup-overlay').classList.remove('hide');renderLB()};
const escapeHtml=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const showPopup=()=>{$('popup-overlay').classList.remove('hide');renderLB()};

/* ── POPUP LOGIC ── */
$('btnStart').addEventListener('click',()=>{
  const name=$('inp-name').value.trim();
  const cls=$('inp-class').value.trim();
  if(!name){$('inp-name').focus();$('inp-name').style.borderColor='rgba(255,80,80,.7)';return}
  $('inp-name').style.borderColor='';
  playerName=name;playerClass=cls;
  $('popup-overlay').classList.add('hide');
});

// Allow Enter key on inputs
[$('inp-name'),$('inp-class')].forEach(el=>{
  el.addEventListener('keydown',e=>{if(e.key==='Enter')$('btnStart').click()});
});

/* ── EVENTS ── */
$('btnPlay').addEventListener('click',startGame);
$('btnAgain').addEventListener('click',()=>{
  $('inp-name').value='';$('inp-class').value='';
  playerName='';playerClass='';
  showPopup();
  show('intro');
});
$('btnWin').addEventListener('click',()=>{
  $('inp-name').value='';$('inp-class').value='';
  playerName='';playerClass='';
  showPopup();
  show('intro');
});
$('btnWalk').addEventListener('click',()=>endGame('walk'));
$('ll50').addEventListener('click',do5050);
$('llPh').addEventListener('click',doPhone);
$('llAu').addEventListener('click',doAudience);
btns.forEach(b=>b.addEventListener('click',()=>pick(+b.dataset.i)));
$('snd').addEventListener('click',()=>{
  const m=AUDIO.toggle();
  $('snd').textContent=m?'🔇':'🔊';
});

renderLadder();
renderLB();
fetch('/kbc/leaderboard.json',{cache:'no-cache'})
  .then(r=>r.ok?r.json():[])
  .then(data=>{if(Array.isArray(data))lbSeed=data;renderLB();})
  .catch(()=>{});

/* ── LOAD QUESTIONS ── */
$('btnPlay').disabled=true;
fetch('/kbc/questions.json',{cache:'no-cache'})
  .then(r=>r.json())
  .then(data=>{QS=data;$('btnPlay').disabled=false;})
  .catch(err=>{console.error('Failed to load questions',err);alert('Could not load questions.json');});
</script>
</body>
</html>
